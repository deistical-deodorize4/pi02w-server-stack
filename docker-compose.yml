---
services:
  # Web server
  nginx:
    image: nginx:stable-alpine-slim
    container_name: nginx-server
    ports:
      - "80:80"
    restart: unless-stopped
    volumes:
      - ./nginx/html:/usr/share/nginx/html
    mem_limit: 32m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Network-wide ad blocking
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    network_mode: host
    environment:
      TZ: ${PIHOLE_TZ:-Europe/Madrid}
      WEBPASSWORD: ${PIHOLE_WEBPASSWORD}
      DNSMASQ_LISTENING: all
      PIHOLE_DNS_1: 9.9.9.9
      PIHOLE_DNS_2: 149.112.112.112
      FTLCONF_webserver_port: 8081
    volumes:
      - './pihole/etc-pihole:/etc/pihole'
      - './pihole/etc-dnsmasq.d:/etc/dnsmasq.d'
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Mesh VPN
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    restart: unless-stopped
    network_mode: host
    environment:
      TS_AUTH_KEY: ${TS_AUTH_KEY:-}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
      TS_ENABLE_HEALTH_CHECK: "true"
    volumes:
      - ./tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    mem_limit: 48m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Docker management
  portainer:
    image: portainer/portainer-ce:alpine
    container_name: portainer
    ports:
      - "9000:9000"
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    mem_limit: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # File browser
  filebrowser:
    image: filebrowser/filebrowser:v2.31.0
    container_name: filebrowser
    ports:
      - "8080:80"
    volumes:
      - ./files:/srv
      - ./filebrowser:/database
    environment:
      FB_PORT: 80
      FB_ADDRESS: 0.0.0.0
      FB_ROOT: /srv
      FB_DATABASE: /database/filebrowser.db
      FB_USERNAME: ${FB_USERNAME:-admin}
      FB_PASSWORD: ${FB_PASSWORD}
    entrypoint: /bin/sh
    command: -c '/filebrowser users update "$${FB_USERNAME}" --password "$${FB_PASSWORD}" 2>/dev/null || true; exec /filebrowser'
    restart: unless-stopped
    mem_limit: 64m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  portainer_data:
