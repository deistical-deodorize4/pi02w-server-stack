---
services:
  # Web server
  nginx:
    image: nginx:stable-alpine-slim
    container_name: nginx-server
    ports:
      - "80:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./nginx/html:/usr/share/nginx/html

  # Network-wide ad blocking
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    network_mode: host
    environment:
      TZ: ${PIHOLE_TZ:-Europe/Madrid}
      WEBPASSWORD: ${PIHOLE_WEBPASSWORD}
      DNSMASQ_LISTENING: all
      PIHOLE_DNS_1: 9.9.9.9
      PIHOLE_DNS_2: 149.112.112.112
      FTLCONF_webserver_port: 8081
    volumes:
      - './pihole/etc-pihole:/etc/pihole'
      - './pihole/etc-dnsmasq.d:/etc/dnsmasq.d'
    restart: unless-stopped
    cap_add:
      - NET_ADMIN

  # Mesh VPN
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    restart: unless-stopped
    network_mode: host
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9002/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      TS_AUTH_KEY: ${TS_AUTH_KEY:-}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
      TS_ENABLE_HEALTH_CHECK: "true"
    volumes:
      - ./tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW

  # Docker management
  portainer:
    image: portainer/portainer-ce:alpine
    container_name: portainer
    ports:
      - "9000:9000"
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "--no-check-certificate", "https://127.0.0.1:9443/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

  # File browser
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    ports:
      - "8080:80"
    volumes:
      - ./files:/srv
      - ./filebrowser:/database
    environment:
      FB_PORT: 80
      FB_ADDRESS: 0.0.0.0
      FB_ROOT: /srv
      FB_DATABASE: /database/filebrowser.db
      FB_USERNAME: ${FB_USERNAME:-admin}
      FB_PASSWORD: ${FB_PASSWORD}
    entrypoint: /bin/sh
    command: -c '/bin/filebrowser users update "$${FB_USERNAME}" --password "$${FB_PASSWORD}" 2>/dev/null || true; exec /bin/filebrowser'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Automatic container updates
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --api-version 1.54 --schedule "0 0 4 * * *" --cleanup
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/watchtower", "--health-check", "--api-version", "1.54"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  portainer_data:
